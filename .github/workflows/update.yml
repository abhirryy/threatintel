name: Update threat feed

on:
  schedule:
    # 5 minutes is GitHub Actions' minimum cron granularity, and about as
    # often as it's polite to hit free RSS feeds / the NVD API without a key.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-feed
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch feeds
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: python scripts/fetch_feeds.py

      - name: Commit updated feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/feed.json
          git diff --cached --quiet && echo "No changes" || git commit -m "Update threat feed"
          git push
